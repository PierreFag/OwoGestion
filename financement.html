<body>

<!-- 🔥 MENU -->
<header>
    <div style="display:flex; justify-content:space-between; align-items:center;">
        
        <div>
                  <div style="display: flex;">
            <div ><h2>💼 OwoGestion</h2></div>
            <div class="societe-ligne">
        <span style="font-weight:bold;">Société:</span>
        <span id="companyName"></span>

            <nav>
                 <nav>
                <a href="register.html">Accueil</a>
                <a href="budget.html" id="menu-budget">Budget</a>
                <a href="indexPAGE.html">Coûts comptabilisés</a>
                <a href="caisse.html">Dépenses en Espèce</a>
                 <a href="approvisionnement.html" id="menu-appro">Approvisionnement caisse</a>

                <a href="rapport.html" id="menu-rapport">Rapport de coûts</a>

                <a href="financement.html" id="menu-financement">Financement</a>

            </nav>

              <!-- 🔥 UTILISATEUR -->
     <div class="right-box">
    
    <div class="projet-ligne">
        <span style="font-weight:bold;">Projet :</span>
        <span id="projectName"></span>
    </div>

    <div id="userBox">
        <a href="profil.html">
            <img id="userPhoto" src="https://via.placeholder.com/40">
        </a>
        <div id="userName"></div>
    </div>
    <div id="userBox">
               <button onclick="logout()" style="background-color: #2c3e50; color: red;margin-right: -10px;">Déconnexion</boutton>
    </div>

</div>

    </div>
</header>

<div class="container">

<h1>💰 Financements</h1>

<div class="box">
    <h3>Ajouter un financement</h3>

    <input type="number" id="montant" placeholder="Montant">
    <input type="datetime-local" id="date">

    <button onclick="ajouterFinancement()">Ajouter</button>
</div>

<h2>Historique</h2>

<table>
<thead>
<tr>
    <th>Date</th>
    <th>Montant</th>
    <th>Actions</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

<tfoot>
<tr style="background: #eee;">
    <td><strong>Total</strong></td>
    <td id="total" style="font-size: large; font-weight: bold;">0</td>
    <td></td>
</tr>
</tfoot>
</table>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, addDoc, collection, getDocs, getDoc, updateDoc,
    deleteDoc, doc, query, where, onSnapshot} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCYBRo0CLV4AD7pzGFIPDGYFIPhJ_JvVJs",
  authDomain: "owogestion-de436.firebaseapp.com",
  projectId: "owogestion-de436",
  storageBucket: "owogestion-de436.firebasestorage.app",
  messagingSenderId: "357508008682",
  appId: "1:357508008682:web:8dfc70a52c876d0552e593"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const localUser = localStorage.getItem("userData");

if (localUser) {
  const data = JSON.parse(localUser);

  afficherUser(data);
}

window.logout = () => {
    localStorage.removeItem("userData"); // 🔥 important
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
};
const tableBody = document.getElementById("tableBody");

let total = 0;

// 🔥 AJOUT
window.ajouterFinancement = async () => {

    const montant = parseFloat(document.getElementById("montant").value);
    const dateInput = document.getElementById("date").value;

    if (!montant) {
        alert("Montant invalide");
        return;
    }

    const date = dateInput ? new Date(dateInput) : new Date();

    await addDoc(collection(db, "financements"), {
        montant,
        date
    });

    document.getElementById("montant").value = "";
    document.getElementById("date").value = "";

    afficherFinancements();
};

// 🔥 SUPPRIMER
window.supprimerFinancement = async (id) => {

    if (!confirm("Supprimer ?")) return;

    await deleteDoc(doc(db, "financements", id));
    afficherFinancements();
};

// 🔥 MODIFIER
window.modifierFinancement = async (id, ancienMontant) => {

    const nouveauMontant = prompt("Nouveau montant :", ancienMontant);
    if (!nouveauMontant) return;

    await updateDoc(doc(db, "financements", id), {
        montant: parseFloat(nouveauMontant)
    });

    afficherFinancements();
};

// 🔥 AFFICHAGE
async function afficherFinancements() {

    tableBody.innerHTML = "";
    total = 0;

    const snapshot = await getDocs(collection(db, "financements"));

    let data = [];

    snapshot.forEach(doc => {
        data.push({ id: doc.id, ...doc.data() });
    });

    // TRI PAR DATE
    data.sort((a, b) => b.date?.seconds - a.date?.seconds);

    data.forEach(item => {

        total += item.montant || 0;

        const date = item.date?.seconds
            ? new Date(item.date.seconds * 1000)
            : new Date();

        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${date.toLocaleString("fr-FR")}</td>
            <td>${item.montant.toLocaleString("fr-FR")} FCFA</td>
            <td>
                <button onclick="modifierFinancement('${item.id}', ${item.montant})">
                    Modifier
                </button>
                <button onclick="supprimerFinancement('${item.id}')">
                    Supprimer
                </button>
            </td>
        `;

        tableBody.appendChild(tr);
    });

    document.getElementById("total").textContent =
        total.toLocaleString("fr-FR") + " FCFA";
}

// INIT
afficherFinancements();

const links = document.querySelectorAll("nav a");

// récupérer le nom de la page actuelle
const currentPage = window.location.pathname.split("/").pop();

links.forEach(link => {
    const linkPage = link.getAttribute("href");

    if (linkPage === currentPage) {
        link.style.color = "#ffd700"; // optionnel (couleur)
    }
});

const localConfig = localStorage.getItem("configData");

if (localConfig) {
    afficherConfig(JSON.parse(localConfig));
}

function afficherConfig(data) {
    document.getElementById("companyName").textContent =
        data.nomSociete || "Société";

    document.getElementById("projectName").textContent =
        data.nomProjet || "Projet";
}
onAuthStateChanged(auth, async (user) => {
if (user) {

   onSnapshot(doc(db, "users", user.uid), (snap) => {

      if (snap.exists()) {
        const data = snap.data();

        appliquerPermissionsMenu(data);
        localStorage.setItem("userData", JSON.stringify(data));
        afficherUser(data);
      
  //     document.getElementById("preview").src =
  // data.photo || "https://via.placeholder.com/120";
        console.log("Auth OK");
      }
      });


    // 🔥 PARAMETRES (UNE SEULE FOIS)
    onSnapshot(doc(db, "parametres", "config"), (configSnap) => {
        if (configSnap.exists()) {
            const configData = configSnap.data();

        // 🔥 STOCKAGE LOCAL
        localStorage.setItem("configData", JSON.stringify(configData));

            afficherConfig(configData);
        }
    });
  } else {
    window.location.href = "index.html";
  }
});

function afficherUser(data) {
 document.getElementById("userPhoto").src =
          data.photo || "https://via.placeholder.com/40";

        document.getElementById("userName").textContent =
          data.prenom + " " + data.nom;
}

function appliquerPermissionsMenu(data) {

  if (data.role === "admin") return;

  if (data.permissions?.budget === "none") {
    document.getElementById("menu-budget")?.remove();
  }

  if (data.permissions?.rapport === "none") {
    document.getElementById("menu-rapport")?.remove();
  }

  if (data.permissions?.rapport === "none") {
    document.getElementById("menu-financement")?.remove();
  }

  if (data.permissions?.rapport === "none") {
    document.getElementById("menu-appro")?.remove();
  }

  if (data.permissions?.rapport === "none") {
    document.getElementById("menu-balance")?.remove();
  }
   if (data.permissions?.paramettre === "none") {
    document.getElementById("menu-paramettre")?.remove();
     }
}
</script>
<br>
</body>
</html>
