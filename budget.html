<h2>Tableau Budget</h2>

<thead>

    <th>Libellé</th>

    <th>Actions </th>

    <td colspan="2" style="font-size: large;"><strong>TOTAL</strong></td>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
    getFirestore, collection, addDoc, getDocs,
    deleteDoc, doc, updateDoc, getDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {

          apiKey: "AIzaSyCYBRo0CLV4AD7pzGFIPDGYFIPhJ_JvVJs",
  authDomain: "owogestion-de436.firebaseapp.com",
  projectId: "owogestion-de436",
  storageBucket: "owogestion-de436.firebasestorage.app",
  messagingSenderId: "357508008682",
  appId: "1:357508008682:web:8dfc70a52c876d0552e593"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const form = document.getElementById("form");
const tableBody = document.getElementById("tableBody");
const numeroInput = document.getElementById("numero");
const libelleInput = document.getElementById("libelle");
const montantInput = document.getElementById("montant");

const localUser = localStorage.getItem("userData");

if (localUser) {
  const data = JSON.parse(localUser);

  afficherUser(data);
}

// 🔥 AJOUT
form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const numero = numeroInput.value;
    const libelle = libelleInput.value;
    const montant = parseFloat(montantInput.value);

    await addDoc(collection(db, "budget"), {
        numero,
        libelle,
        montant
    });

    form.reset();
    afficherBudget();
});


// 🔥 TRI
function trierHierarchique(a, b) {
    const na = a.numero.split("").map(Number);
    const nb = b.numero.split("").map(Number);

    for (let i = 0; i < Math.max(na.length, nb.length); i++) {
        const diff = (na[i] || 0) - (nb[i] || 0);
        if (diff !== 0) return diff;
    }
    return 0;
}

// 🔥 NIVEAU
function getLevel(numero) {
    return numero.length - 1;
}

// 🔥 AFFICHAGE
async function afficherBudget() {

    onSnapshot(collection(db, "budget"), (snapshot) => {

    tableBody.innerHTML = "";


    let data = [];

    snapshot.forEach(docItem => {
        data.push({
            id: docItem.id,
            ...docItem.data()
        });
    });

    // 🔥 TRI (compatible alpha-numérique)
    data.sort(trierHierarchique);

    let totalGeneral = 0;

    let groupes = {};
    let parentsInfo = {};

    // 🔥 DETECTION GROUPES + PARENTS
    data.forEach(item => {

        if (!item.numero) return;

        const parent = item.numero.substring(0, 2); // 🔥 base catégorie (11)

        // 🔥 stocker parent si existe (ex: 11)
        if (item.numero === parent) {
            parentsInfo[parent] = item;
        }

        if (!groupes[parent]) {
            groupes[parent] = [];
        }

        // 🔥 exclure parent de ses enfants
        if (item.numero !== parent) {
            groupes[parent].push(item);
        }
    });

    // 🔥 AFFICHAGE
    Object.keys(groupes).forEach(parent => {

        let sousTotal = 0;

        groupes[parent].forEach(item => {
            sousTotal += Number(item.montant) || 0;
        });

        // 🔥 NOM PERSONNALISÉ
        const libelleParent = parentsInfo[parent]?.libelle || "";

        // 🔥 LIGNE PARENT (cliquable)
        const trParent = document.createElement("tr");
        trParent.style.background = "#ddd";
        trParent.style.fontWeight = "bold";

        trParent.innerHTML = `
            <td>${parent}</td>
            <td class="indent-1"
                style="cursor:pointer; color:#2c3e50;"
                onclick="modifierCategorie('${parent}', '${libelleParent}')">
                ${libelleParent || "cliquer pour nommer"}
            </td>
            <td>${sousTotal.toLocaleString()} FCFA</td>
            <td></td>
        `;

        tableBody.appendChild(trParent);

        // 🔥 ENFANTS
        groupes[parent].forEach(item => {

            const tr = document.createElement("tr");

            const montant = Number(item.montant) || 0;

            tr.innerHTML = `
                <td>${item.numero}</td>
                <td class="indent-2">${item.libelle}</td>
                <td>${montant.toLocaleString()} FCFA</td>
                <td>
                    <button onclick="modifier('${item.id}', '${item.numero}', '${item.libelle}', ${montant})">Modifier</button>
                    <button onclick="supprimer('${item.id}')">Supprimer</button>
                </td>
            `;

            tableBody.appendChild(tr);
        });

        totalGeneral += sousTotal;
    });

    document.getElementById("total").textContent =
        totalGeneral.toLocaleString() + " FCFA";
});
}

window.modifierCategorie = async (numero, ancienLibelle) => {

    const nouveauNom = prompt("Nom de la catégorie :", ancienLibelle);

    if (!nouveauNom) return;

    // 🔥 chercher si catégorie existe
    const snapshot = await getDocs(collection(db, "budget"));

    let docTrouve = null;

    snapshot.forEach(docItem => {
        if (docItem.data().numero === numero) {
            docTrouve = docItem;
        }
    });

    if (docTrouve) {
        // 🔥 update
        await updateDoc(doc(db, "budget", docTrouve.id), {
            libelle: nouveauNom
        });
    } else {
        // 🔥 créer la catégorie (IMPORTANT)
        await addDoc(collection(db, "budget"), {
            numero: numero,
            libelle: nouveauNom,
            montant: 0
        });
    }

    // 🔥 recharge
};

// 🔥 SUPPRIMER
window.supprimer = async (id) => {

    if (!confirm("Supprimer cette ligne ?")) return;

    await deleteDoc(doc(db, "budget", id));

    afficherBudget();
};

function appliquerPermissionsMenu(data) {

  if (data.role === "admin") return;

  if (data.permissions?.budget === "none") {
    document.getElementById("menu-budget")?.remove();
  }

  if (data.permissions?.rapport === "none") {
    document.getElementById("menu-rapport")?.remove();
  }

  if (data.permissions?.rapport === "none") {
    document.getElementById("menu-financement")?.remove();
  }

  if (data.permissions?.rapport === "none") {
    document.getElementById("menu-appro")?.remove();
  }

  if (data.permissions?.rapport === "none") {
    document.getElementById("menu-balance")?.remove();
  }

   if (data.permissions?.paramettre === "none") {
    document.getElementById("menu-paramettre")?.remove();
     }
}

// 🔥 MODIFIER
window.modifier = async (id, numero, libelle, montant) => {

    const newNumero = prompt("Nouveau numéro :", numero);
    const newLibelle = prompt("Nouveau libellé :", libelle);
    const newMontant = prompt("Nouveau montant :", montant);

    if (!newNumero || !newLibelle || !newMontant) return;

    await updateDoc(doc(db, "budget", id), {
        numero: newNumero,
        libelle: newLibelle,
        montant: parseFloat(newMontant)
    });
    afficherBudget();
};

// INIT

afficherBudget();



function afficherUser(data) {
 document.getElementById("userPhoto").src =
          data.photo || "https://via.placeholder.com/40";

        document.getElementById("userName").textContent =
          data.prenom + " " + data.nom;
}
onSnapshot(doc(db, "parametres", "config"), (snap) => {
  if (snap.exists()) {
    const data = snap.data();
        document.getElementById("companyName").textContent =
        snap.data().nomSociete || "Société";
    
        document.getElementById("projectName").textContent =
      snap.data().nomProjet || "Projet";
  }
});

window.logout = () => {
    localStorage.removeItem("userData"); // 🔥 important
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
};

const links = document.querySelectorAll("nav a");

// récupérer le nom de la page actuelle
const currentPage = window.location.pathname.split("/").pop();

links.forEach(link => {
    const linkPage = link.getAttribute("href");

    if (linkPage === currentPage) {
        link.style.color = "#ffd700"; // optionnel (couleur)
    }
});

onAuthStateChanged(auth, async (user) => {
if (user) {

    onSnapshot(doc(db, "users", user.uid), (snap) => {

      if (snap.exists()) {
        const data = snap.data();

        appliquerPermissionsMenu(data);
        localStorage.setItem("userData", JSON.stringify(data));
        afficherUser(data);
      
  //     document.getElementById("preview").src =
  // data.photo || "https://via.placeholder.com/120";
        console.log("Auth OK");
      }
      });
  } else { 
    return location.href = "index.html";

  const snap = await getDoc(doc(db, "users", user.uid));

  if (!snap.exists()) return;

  const data = snap.data();

  // 🔥 compte désactivé
  if (!data.active) {
    alert("Compte désactivé");
    signOut(auth);
    return;
  }

  // 🔥 permission page
  if (data.permissions.budget === "none") {
    alert("Accès refusé");
    location.href = "register.html";
  }

  // 🔥 lecture seule
  if (data.permissions.budget === "read") {
    document.querySelectorAll("button, input, select, textarea")
      .forEach(el => el.disabled = true);
  }
  }
});

</script>
<br>
</body>
