<h2>Mon Profil</h2>

<img id="preview" width="120"><br><br>

<input type="file" id="photo"><br><br>
<button onclick="uploadPhoto()">Mettre à jour</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = { 
  apiKey: "AIzaSyCYBRo0CLV4AD7pzGFIPDGYFIPhJ_JvVJs",
  authDomain: "owogestion-de436.firebaseapp.com",
  projectId: "owogestion-de436",
  storageBucket: "owogestion-de436.firebasestorage.app",
  messagingSenderId: "357508008682",
  appId: "1:357508008682:web:8dfc70a52c876d0552e593"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


const localConfig = localStorage.getItem("configData");

if (localConfig) {
    afficherConfig(JSON.parse(localConfig));
}

function afficherConfig(data) {
    document.getElementById("companyName").textContent =
        data.nomSociete || "Société";

    document.getElementById("projectName").textContent =
        data.nomProjet || "Projet";
}



let currentUser=null;
onAuthStateChanged(auth, async (user) => {
if (user) {
    currentUser=user;
     // 🔥 USER
    onSnapshot(doc(db, "users", user.uid), (snap) => {
        if (snap.exists()) {
            const data = snap.data();

            appliquerPermissionsMenu(data);

            localStorage.setItem("userData", JSON.stringify(data));
            afficherUser(data);
        }
    });

    // 🔥 PARAMETRES (UNE SEULE FOIS)
    onSnapshot(doc(db, "parametres", "config"), (configSnap) => {
        if (configSnap.exists()) {
            const configData = configSnap.data();

        // 🔥 STOCKAGE LOCAL
        localStorage.setItem("configData", JSON.stringify(configData));

            afficherConfig(configData);
        }
    });
  } else {
    window.location.href = "index.html";
  }
});


const localUser = localStorage.getItem("userData");

if (localUser) {
  const data = JSON.parse(localUser);

  afficherUser(data);
}

function afficherUser(data) {
 document.getElementById("userPhoto").src =
          data.photo || "https://via.placeholder.com/40";

        document.getElementById("userName").textContent =
          data.prenom + " " + data.nom;
}


function appliquerPermissionsMenu(data) {

  if (data.role === "admin") return;

  if (data.permissions?.budget === "none") {
    document.getElementById("menu-budget")?.remove();
  }

  if (data.permissions?.rapport === "none") {
    document.getElementById("menu-rapport")?.remove();
  }

  if (data.permissions?.rapport === "none") {
    document.getElementById("menu-financement")?.remove();
  }

  if (data.permissions?.rapport === "none") {
    document.getElementById("menu-appro")?.remove();
  }

  if (data.permissions?.rapport === "none") {
    document.getElementById("menu-balance")?.remove();
  }

   if (data.permissions?.paramettre === "none") {
    document.getElementById("menu-paramettre")?.remove();
     }
}

window.uploadPhoto = async () => {

  const file = document.getElementById("photo").files[0];

  if (!file) return alert("Choisir une image");

  if (!currentUser) {
    alert("Utilisateur non connecté !");
    return;
  }

    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", "OwoGestion_upload");
    formData.append("folder", "PROFIL_PHOTOS"); 

    const res = await fetch("https://api.cloudinary.com/v1_1/dbp6jdmxz/auto/upload", {
        method: "POST",
        body: formData
    });

  const data = await res.json();
  console.log(data); // 🔥 debug

  if (!data.secure_url) {
    alert("Erreur upload image");
    return;
  }

  await updateDoc(doc(db, "users", currentUser.uid), {
    photo: data.secure_url
  });

  document.getElementById("userPhoto").src = data.secure_url;

  alert("Photo mise à jour !");
};


window.logout = () => {
    localStorage.removeItem("userData"); // 🔥 important
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
};



// 🔥 ENREGISTRER NOM PROJET
window.saveProjet = async () => {

    const nom = document.getElementById("nomProjet").value;

    if (!nom) {
        alert("Nom invalide");
        return;
    }

    await setDoc(doc(db, "parametres", "config"), {
        nomProjet: nom
    }, { merge: true });

    alert("Nom enregistré !");
};


// INIT
const links = document.querySelectorAll("nav a");

// récupérer le nom de la page actuelle
const currentPage = window.location.pathname.split("/").pop();

links.forEach(link => {
    const linkPage = link.getAttribute("href");

    if (linkPage === currentPage) {
        link.style.color = "#ffd700"; // optionnel (couleur)
    }
});

</script>
