<h1>💰 Approvisionnement Caisse</h1>

<a href="caisse.html">⬅ Retour caisse</a>

<div class="box">
    <h3>Ajouter un approvisionnement</h3>
    <input type="number" id="montant" placeholder="Montant">
    <button onclick="ajouterAppro()">Ajouter</button>
</div>

<hr>

<h2>Historique des approvisionnements</h2>

<table>
<thead>
<tr>
    <th>Date</th>
    <th>Montant</th>
    <th>Actions</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

<tfoot>
<tr style="background-color: #eee;">
    <td ><strong>Total</strong></td>
    <td id="total" style="font-size: large; font-weight: bold;"><strong>0</strong></td>
    <td></td>
</tr>
</tfoot>

</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, addDoc, collection, getDocs, getDoc, updateDoc,
    deleteDoc, doc, query, where, onSnapshot} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCYBRo0CLV4AD7pzGFIPDGYFIPhJ_JvVJs",
  authDomain: "owogestion-de436.firebaseapp.com",
  projectId: "owogestion-de436",
  storageBucket: "owogestion-de436.firebasestorage.app",
  messagingSenderId: "357508008682",
  appId: "1:357508008682:web:8dfc70a52c876d0552e593"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const localUser = localStorage.getItem("userData");

if (localUser) {
  const data = JSON.parse(localUser);

  afficherUser(data);
}

window.logout = () => {
    localStorage.removeItem("userData"); // 🔥 important
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
};

const tableBody = document.getElementById("tableBody");

let total = 0;

// 🔥 AJOUT APPRO
window.ajouterAppro = async () => {

    const montant = parseFloat(document.getElementById("montant").value);

    if (!montant) {
        alert("Montant invalide");
        return;
    }

    await addDoc(collection(db, "caisse"), {
        montant,
        date: new Date()
    });

    document.getElementById("montant").value = "";

    afficherAppro();
};
window.supprimerAppro = async (id) => {

    if (!confirm("Voulez-vous supprimer cet approvisionnement ?")) return;

    try {
        await deleteDoc(doc(db, "caisse", id));
        alert("Supprimé !");
        afficherAppro();
    } catch (err) {
        console.error(err);
        alert("Erreur suppression");
    }
};
window.modifierAppro = async (id, ancienMontant, ancienneDate) => {

    const nouveauMontant = prompt("Nouveau montant :", ancienMontant);
    if (!nouveauMontant) return;

    const nouvelleDate = prompt("Nouvelle date (YYYY-MM-DD HH:MM) :", "");

    if (!confirm("Confirmer modification ?")) return;

    try {

        let updateData = {
            montant: parseFloat(nouveauMontant)
        };

        // 🔥 gestion date
        if (nouvelleDate) {
            updateData.date = new Date(nouvelleDate);
        }

        await updateDoc(doc(db, "caisse", id), updateData);

        alert("Modifié !");
        afficherAppro();

    } catch (err) {
        console.error(err);
        alert("Erreur modification");
    }
};


// 🔥 AFFICHAGE AVEC TRI PAR DATE
async function afficherAppro() {

    tableBody.innerHTML = "";
    total = 0;

    const snapshot = await getDocs(collection(db, "caisse"));

    let data = [];

    snapshot.forEach(doc => {
    data.push({ id: doc.id, ...doc.data() });
});

    // 🔥 TRI PAR DATE (du plus récent au plus ancien)
    data.sort((a, b) => b.date?.seconds - a.date?.seconds);

    data.forEach(item => {

        total += item.montant || 0;

        const date = item.date?.seconds 
            ? new Date(item.date.seconds * 1000)
            : new Date();

        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${date.toLocaleString("fr-FR")}</td>
            <td>${Number(item.montant).toLocaleString("fr-FR")} FCFA</td>
            <td>
        <button onclick="modifierAppro('${item.id}', ${item.montant}, '${item.date?.toDate?.() || ''}')">
            Modifier
        </button>
        <button onclick="supprimerAppro('${item.id}')">
            Supprimer
        </button>
    </td>

        `;

        tableBody.appendChild(tr);
    });

    document.getElementById("total").textContent =
        total.toLocaleString("fr-FR") + " FCFA";
}

// INIT
afficherAppro();

const links = document.querySelectorAll("nav a");

// récupérer le nom de la page actuelle
const currentPage = window.location.pathname.split("/").pop();

links.forEach(link => {
    const linkPage = link.getAttribute("href");

    if (linkPage === currentPage) {
        link.style.color = "#ffd700"; // optionnel (couleur)
    }
});

const localConfig = localStorage.getItem("configData");

if (localConfig) {
    afficherConfig(JSON.parse(localConfig));
}

function afficherConfig(data) {
    document.getElementById("companyName").textContent =
        data.nomSociete || "Société";

    document.getElementById("projectName").textContent =
        data.nomProjet || "Projet";
}

onAuthStateChanged(auth, async (user) => {
if (user) {

   
    onSnapshot(doc(db, "users", user.uid), (snap) => {

      if (snap.exists()) {
        const data = snap.data();

        appliquerPermissionsMenu(data);
        localStorage.setItem("userData", JSON.stringify(data));
        afficherUser(data);
      
  //     document.getElementById("preview").src =
  // data.photo || "https://via.placeholder.com/120";
        console.log("Auth OK");
      }
      });


    // 🔥 PARAMETRES (UNE SEULE FOIS)
    onSnapshot(doc(db, "parametres", "config"), (configSnap) => {
        if (configSnap.exists()) {
            const configData = configSnap.data();

        // 🔥 STOCKAGE LOCAL
        localStorage.setItem("configData", JSON.stringify(configData));

            afficherConfig(configData);
        }
    });
  } else {
    window.location.href = "index.html";
  }
});

function afficherUser(data) {
 document.getElementById("userPhoto").src =
          data.photo || "https://via.placeholder.com/40";

        document.getElementById("userName").textContent =
          data.prenom + " " + data.nom;
}

function appliquerPermissionsMenu(data) {

  if (data.role === "admin") return;

  if (data.permissions?.budget === "none") {
    document.getElementById("menu-budget")?.remove();
  }

  if (data.permissions?.rapport === "none") {
    document.getElementById("menu-rapport")?.remove();
  }

  if (data.permissions?.rapport === "none") {
    document.getElementById("menu-financement")?.remove();
  }

  if (data.permissions?.rapport === "none") {
    document.getElementById("menu-appro")?.remove();
  }

  if (data.permissions?.rapport === "none") {
    document.getElementById("menu-balance")?.remove();
  }

   if (data.permissions?.paramettre === "none") {
    document.getElementById("menu-paramettre")?.remove();
     }
}
</script>
